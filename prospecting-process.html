<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospecting Process</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1b2a;
    color: #f0f4f8;
    min-height: 100vh;
    padding: 2rem 1.5rem 3rem;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .subtitle {
    text-align: center;
    font-size: 0.95rem;
    color: #8fa3b8;
    margin-bottom: 2rem;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .controls button {
    background: transparent;
    border: 1px solid #2e4a63;
    color: #8fa3b8;
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .controls button:hover {
    border-color: #5b8fb9;
    color: #c9daea;
    background: rgba(91,143,185,0.1);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }

  @media (max-width: 750px) { .grid { grid-template-columns: 1fr; } }
  @media (min-width: 751px) and (max-width: 1000px) { .grid { grid-template-columns: repeat(2, 1fr); } }

  .week-card {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.07);
    background: #142233;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .week-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.35); }

  .week-header {
    padding: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 13px;
  }

  .wh-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .wh-text { flex: 1; min-width: 0; }
  .wh-week { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
  .wh-label { font-size: 15px; font-weight: 600; color: #e8f0f8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wh-sub { font-size: 12px; color: #6e8ca8; margin-top: 2px; }

  .chevron {
    font-size: 11px;
    color: #4a6780;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(180deg); }

  .week-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .week-body.open { max-height: 1000px; }

  .body-inner { padding: 0 16px 16px; }

  .divider { height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 12px; }

  .day-item {
    padding: 10px 12px;
    border-radius: 9px;
    background: rgba(255,255,255,0.04);
    margin-bottom: 8px;
    border-left: 3px solid transparent;
    transition: background 0.15s;
  }
  .day-item:last-child { margin-bottom: 0; }
  .day-item:hover { background: rgba(255,255,255,0.07); }

  .day-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 5px;
  }

  .day-text { font-size: 13px; color: #b0c4d8; line-height: 1.6; }

  .w1 .wh-icon { background: #1a4a7a; color: #7ab8f5; }
  .w1 .wh-week { color: #5ba0e0; }
  .w1 .day-item { border-left-color: #2d6da8; }
  .w1 .day-label { color: #5ba0e0; }

  .w2 .wh-icon { background: #0f4a3a; color: #5dd4aa; }
  .w2 .wh-week { color: #3dbf8e; }
  .w2 .day-item { border-left-color: #1a7a5a; }
  .w2 .day-label { color: #3dbf8e; }

  .w3 .wh-icon { background: #2a4a10; color: #a0d455; }
  .w3 .wh-week { color: #8ac030; }
  .w3 .day-item { border-left-color: #4a8020; }
  .w3 .day-label { color: #8ac030; }

  .w4 .wh-icon { background: #4a3200; color: #f5b840; }
  .w4 .wh-week { color: #e0a020; }
  .w4 .day-item { border-left-color: #8a6010; }
  .w4 .day-label { color: #e0a020; }

  .w5 .wh-icon { background: #4a2010; color: #f0845a; }
  .w5 .wh-week { color: #d86030; }
  .w5 .day-item { border-left-color: #8a3820; }
  .w5 .day-label { color: #d86030; }

  .w6 .wh-icon { background: #4a1030; color: #f075a8; }
  .w6 .wh-week { color: #d04880; }
  .w6 .day-item { border-left-color: #8a2050; }
  .w6 .day-label { color: #d04880; }
</style>
</head>
<body>

<h1>Prospecting Process</h1>
<p class="subtitle">A 6-week outreach framework — click each week to expand</p>

<div class="controls">
  <button onclick="toggleAll(true)">Expand all</button>
  <button onclick="toggleAll(false)">Collapse all</button>
</div>

<div class="grid" id="grid"></div>

<script>
const weeks = [
  {
    cls: "w1", num: "Week 1", label: "Initial Reach Out",
    sub: "Make your first impression", icon: "1",
    days: [
      { label: "Mon — Day 1", text: "Send an initial outreach email introducing who you are, why you're reaching out, and a value-add specific to the prospect's buyer persona." },
      { label: "Wed — Day 3", text: "Follow-up phone call. If no answer, leave a short and friendly voicemail referencing your earlier email." },
      { label: "Fri — Day 5", text: "Send a LinkedIn connection request with a personalized note mentioning your email or voicemail to reinforce the relationship." }
    ]
  },
  {
    cls: "w2", num: "Week 2", label: "Provide Value",
    sub: "Educate and engage", icon: "2",
    days: [
      { label: "Tue — Day 2", text: "Follow up your initial email with additional info or useful resources such as relevant articles or white papers aligned to their interests." },
      { label: "Wed — Day 3", text: "Social media engagement — like or comment on one of the prospect's recent posts if they're active on LinkedIn." },
      { label: "Thu — Day 4", text: "Short check-in call. If there's still no response, reference that you'll reach out again next week to stay top of mind." }
    ]
  },
  {
    cls: "w3", num: "Week 3", label: "Building a Connection",
    sub: "Personalize & deepen the relationship", icon: "3",
    days: [
      { label: "Wed — Day 3", text: "Send a pro-market candidate profile and mention current market trends and how you help other clients navigate them — positioning yourself as a trusted advisor." },
      { label: "Thu — Day 4", text: "Send a quick text message or LinkedIn message referencing the pro-market candidate profile you shared to reinforce the conversation." }
    ]
  },
  {
    cls: "w4", num: "Week 4", label: "Personal Engagement",
    sub: "Warm outreach & live contact", icon: "4",
    days: [
      { label: "Mon — Day 1", text: "Send a friendly 'just checking in' email, inviting the prospect to share any questions they may have about your services or the market." },
      { label: "Fri — Day 5", text: "Make a quick call and leave a simple voicemail that refers back to your previous messages and the pro-market candidate profile you shared." }
    ]
  },
  {
    cls: "w5", num: "Week 5", label: "Offer Resources",
    sub: "Demonstrate expertise", icon: "5",
    days: [
      { label: "Tue — Day 2", text: "Email reply to the pro-market candidate profile — add your commentary, insights, or a gentle nudge to gauge their interest level." },
      { label: "Thu — Day 4", text: "Follow-up call to see if they had a chance to review your email from Tuesday. Keep it brief and conversational." }
    ]
  },
  {
    cls: "w6", num: "Week 6", label: "Final Push / Closing",
    sub: "Wrap up or leave the door open", icon: "6",
    days: [
      { label: "Mon — Day 1", text: "Send a summary email articulating exactly how you can add specific value to their buyer persona and business — make the case clearly." },
      { label: "Wed — Day 3", text: "Send a short LinkedIn message expressing that you'd love to connect whenever they're available — low pressure, relationship-focused." },
      { label: "Fri — Day 5", text: "Final call. Leave a friendly backing-off voicemail reiterating your open-door policy for future needs, and politely ask if they know anyone who could benefit from an introduction." }
    ]
  }
];

function buildCard(w, i) {
  const id = "body-" + i;
  return `
  <div class="week-card ${w.cls}">
    <div class="week-header" onclick="toggle('${id}')">
      <div class="wh-icon">${w.icon}</div>
      <div class="wh-text">
        <div class="wh-week">${w.num}</div>
        <div class="wh-label">${w.label}</div>
        <div class="wh-sub">${w.sub}</div>
      </div>
      <span class="chevron" id="chev-${id}">▼</span>
    </div>
    <div class="week-body" id="${id}">
      <div class="body-inner">
        <div class="divider"></div>
        ${w.days.map(d => `
        <div class="day-item">
          <div class="day-label">${d.label}</div>
          <div class="day-text">${d.text}</div>
        </div>`).join("")}
      </div>
    </div>
  </div>`;
}

document.getElementById("grid").innerHTML = weeks.map((w, i) => buildCard(w, i)).join("");


function toggle(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById("chev-" + id);
  const isOpen = body.classList.contains("open");

  // Close all other cards
  weeks.forEach((_, i) => {
    const otherId = "body-" + i;
    if (otherId !== id) {
      document.getElementById(otherId).classList.remove("open");
      document.getElementById("chev-" + otherId).classList.remove("open");
    }
  });

  // Toggle the clicked card
  body.classList.toggle("open", !isOpen);
  chev.classList.toggle("open", !isOpen);
}

</script>
</body>
</html>
