<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospecting Process</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1b2a;
    color: #f0f4f8;
    min-height: 100vh;
    padding: 2rem 1.5rem 3rem;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    text-align: center;
    font-size: 0.95rem;
    color: #8fa3b8;
    margin-bottom: 2rem;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .controls button {
    background: transparent;
    border: 1px solid #2e4a63;
    color: #8fa3b8;
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }

  @media (max-width: 750px) { .grid { grid-template-columns: 1fr; } }
  @media (min-width: 751px) and (max-width: 1000px) { .grid { grid-template-columns: repeat(2, 1fr); } }

  .week-card {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.07);
